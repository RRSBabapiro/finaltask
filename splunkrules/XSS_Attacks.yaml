name: "XSS_Detection"
search: |
      index="webserver"
       | where match(request_path, "(?i)<(script|iframe|svg|img|body|details|audio|video|input|object|embed|details|marquee|style|source|link|meta)\b|on[a-z]+\s*=|javascript:|data:text/html|vbscript:|alert\(|confirm\(|prompt\(|eval\(|atob\(|String\.fromCharCode|setTimeout\(|setInterval\(|document\.(cookie|location|write|domain|referrer)|window\.name|fetch\(|XMLHttpRequest\(|location\.href=")
       | where NOT match(request_path, "(?i)/etc/passwd|/windows/win\.ini|\.env|\.git|XDEBUG|wget|curl|chmod|chown")
       | where NOT match(request_path, "\\x")
       | table _time, clientip, request_path, statuscode, useragent
earliest_time: "0"
latest_time: "now"
description: "Rule XSS hücumlarını təyin edir"
