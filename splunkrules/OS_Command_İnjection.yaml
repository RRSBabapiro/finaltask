name: "OS_Command_Injection_Detection"
search: |
  index="webserver"
  | where match(request_path, "(?i)(;|&&|\|\||`|\$\()\s*(wget|curl|python|perl|bash|sh|chmod|chown|whoami|cat|type|dir|ls|ipconfig|ifconfig|id|uname|net\s+user|powershell)")
  | where NOT match(request_path, "\\x")
  | table _time, clientip, request_path, statuscode, useragent
earliest_time: "0"
latest_time: "now"
description: "Real OS command injeksiyalarını aşkar edir"
