name: "Aggressive_WAF_Reconnaissance_Detection"
description: "10 d…ôqiq…ô …ôrzind…ô eyni IP-d…ôn g…ôl…ôn 100-d…ôn √ßox bloklanmńĪŇü sorńüunu v…ô 10-dan √ßox f…ôrqli resursun h…ôd…ôf alńĪnmasńĪnńĪ (k…ôŇüfiyyat) aŇükarlayńĪr."
tags:
  - "OWASP A01:2021"
  - "Reconnaissance"
  - "WAF_Monitoring"
  - "Sucuri_Logs"

search: |
  index="waf" sucuri_is_blocked="true"
  | bucket _time span=10m
  | stats
      count as total_hits,
      dc(resource_path) as unique_targets,
      values(request_country_name) as source_country
      by remote_addr, _time
  | where total_hits > 100 AND unique_targets > 10
  | sort - total_hits

earliest_time: "0"
latest_time: "now"
cron_schedule: "*/10 * * * *"
scheduling: "real-time"
