name: "Sensitive_File_and_Config_Access_Detection"
description: "Sistem konfiqurasiyaları (.env, .git), ehtiyat nüsxələr (.bak, .sql) və kritik idarəetmə fayllarına daxil olma cəhdlərini aşkar edir."
tags:
  - "OWASP A05:2021"
  - "Security Misconfiguration"

search: |
 index="webserver"
  | where match(request_path, "(?i)/etc/passwd|/etc/shadow|/etc/group|/windows/win.ini|/boot\.ini|\.ssh/id_rsa|\.bash_history")
  | table _time, clientip, request_path, statuscode, useragent

earliest_time: "0"
latest_time: "now"
