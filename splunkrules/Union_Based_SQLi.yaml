name: "Union_based_SQL_Injection_Detection"
search: |
        index="webserver"
          | where match(request_path, "(?i)UNION(\s+|\/\*.*\*\/)+(ALL\s+)?SELECT|ORDER(\s+|\/\*.*\*\/)+BY\s+\d+|GROUP(\s+|\/\*.*\*\/)+CONCAT\s*\(|SELECT(\s+|\/\*.*\*\/)+.*FROM(\s+|\/\*.*\*\/)+(information_schema|mysql|sys|msysobjects|sqlite_master)")
          | table _time, clientip, request_path, statuscode, useragent
earliest_time: "0"
latest_time: "now"
description: "Web server loqlarında Union based SQL Injection hücumlarını aşkarlayır."
