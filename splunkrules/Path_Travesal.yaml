name: "Path_Traversal_LFI_Detection"
description: "Qovluqlardan yuxarı qalxaraq (../../) sistem fayllarına daxil olma cəhdlərini aşkar edir."
tags:
  - "OWASP A01:2021"
  - "Broken Access Control"

search: |
  index="webserver"
   | where match(request_path, "(?i)\.\./\.\.|\.\.\\\.\.\\|/etc/passwd|/etc/shadow|/etc/group|/windows/win.ini|/boot\.ini")
   | table _time, clientip, request_path, statuscode, useragent

earliest_time: "0"
latest_time: "now"
